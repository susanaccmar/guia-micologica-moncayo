let preguntas=[...preguntasOriginales],modoRevision=false,indice=0,aciertos=0,fallos=0,respondida=false,falladas=[];
const $=id=>document.getElementById(id), questionEl=$('question'), answersEl=$('answers'), feedbackEl=$('feedback'), feedbackTitleEl=$('feedback-title'), feedbackTextEl=$('feedback-text'), nextBtn=$('next-btn'), restartBtn=$('restart-btn'), restartFinalBtn=$('restart-final-btn'), reviewBtn=$('review-btn'), counterEl=$('counter'), hitsEl=$('hits'), missesEl=$('misses'), progressBar=$('progress-bar'), quizCard=$('quiz-card'), resultCard=$('result-card'), finalScore=$('final-score'), finalMessage=$('final-message');
function cargarPregunta(){respondida=false;const actual=preguntas[indice];counterEl.textContent=`${modoRevision?'Revisión':'Pregunta'} ${indice+1} de ${preguntas.length}`;questionEl.textContent=actual.pregunta;answersEl.innerHTML='';feedbackEl.classList.remove('show');nextBtn.classList.add('hidden');restartBtn.classList.remove('hidden');progressBar.style.width=`${(indice/preguntas.length)*100}%`;actual.respuestas.forEach((respuesta,i)=>{const btn=document.createElement('button');btn.className='answer';btn.innerHTML=`<span class="letter">${String.fromCharCode(97+i)})</span> ${respuesta}`;btn.addEventListener('click',()=>comprobarRespuesta(i,btn));answersEl.appendChild(btn);});}
function comprobarRespuesta(elegida,boton){if(respondida)return;respondida=true;const actual=preguntas[indice],botones=[...document.querySelectorAll('.answer')];botones.forEach((btn,i)=>{btn.disabled=true;if(i===actual.correcta)btn.classList.add('correct');});const ok=elegida===actual.correcta;if(ok){aciertos++;feedbackTitleEl.textContent='¡Correcto!';feedbackTitleEl.className='ok';}else{fallos++;boton.classList.add('wrong');feedbackTitleEl.textContent='No es correcta';feedbackTitleEl.className='bad';if(!modoRevision)falladas.push(actual);}hitsEl.textContent=aciertos;missesEl.textContent=fallos;feedbackTextEl.innerHTML=actual.explicacion.map(linea=>`<p>${linea}</p>`).join('');feedbackEl.classList.add('show');nextBtn.classList.remove('hidden');nextBtn.textContent=indice===preguntas.length-1?'Ver resultado':'Siguiente pregunta';}
function siguiente(){if(indice<preguntas.length-1){indice++;cargarPregunta();}else mostrarResultado();}
function mostrarResultado(){progressBar.style.width='100%';quizCard.classList.add('hidden');resultCard.classList.remove('hidden');const pct=Math.round((aciertos/preguntas.length)*100);finalScore.textContent=`Has obtenido ${aciertos} aciertos y ${fallos} fallos (${pct}%).`;if(modoRevision){finalMessage.textContent=fallos===0?'Muy bien: has corregido todos los fallos de esta revisión.':'Puedes volver a revisar los fallos que queden.';reviewBtn.classList.toggle('hidden',fallos===0);}else{finalMessage.textContent=pct>=80?'Muy buen resultado.':pct>=50?'Buen avance. Revisa las preguntas falladas para afianzar conceptos.':'Toca repasar con calma. La revisión de fallos te ayudará a centrarte en los puntos débiles.';reviewBtn.classList.toggle('hidden',falladas.length===0);}}
function reiniciarCompleto(){preguntas=[...preguntasOriginales];modoRevision=false;indice=0;aciertos=0;fallos=0;falladas=[];hitsEl.textContent='0';missesEl.textContent='0';quizCard.classList.remove('hidden');resultCard.classList.add('hidden');cargarPregunta();}
function revisarFallos(){if(!falladas.length)return;preguntas=[...falladas];modoRevision=true;indice=0;aciertos=0;fallos=0;falladas=[];hitsEl.textContent='0';missesEl.textContent='0';quizCard.classList.remove('hidden');resultCard.classList.add('hidden');cargarPregunta();}
nextBtn.addEventListener('click',siguiente);restartBtn.addEventListener('click',reiniciarCompleto);restartFinalBtn.addEventListener('click',reiniciarCompleto);reviewBtn.addEventListener('click',revisarFallos);cargarPregunta();
</script>
</body>
</html>
